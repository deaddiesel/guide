plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
}

version = '1.0.0'
group = 'com.deaddiesel'

base {
    archivesName = "guide"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: '1.20.1'
    copyIdeResources = true

    // 🔥 ГЛАВНЫЙ ФИКС: отключаем module path для ForgeGradle
    ext.inferModulePath = false

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'

            args '--ignoreModulePath'

            // 🔥 отключаем модульную систему для запуска
            jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                    '--add-opens', 'java.base/java.util=ALL-UNNAMED'

            mods {
                main {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run-server')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            args '--nogui'

            // 🔥 То же для сервера
            jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'

            mods {
                main {
                    source sourceSets.main
                }
            }
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:1.20.1-47.4.20"

    implementation 'com.vladsch.flexmark:flexmark:0.64.8'
    implementation 'com.vladsch.flexmark:flexmark-util-data:0.64.8'

    // ✅ Правильное подключение твоего локального JEI
    compileOnly fg.deobf(files('libs/jei-1.20.1-forge-15.20.0.130.jar'))
    //runtimeOnly fg.deobf(files('libs/jei-1.20.1-forge-15.20.0.130.jar'))
}

compileJava {
    options.encoding = 'UTF-8'
}

// 🔥 УДАЛИ или закомментируй этот блок — он конфликтует с FG:
// java {
//     modularity.inferModulePath = false
// }

// 🔥 Убери --limit-modules если есть:
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    // options.compilerArgs.addAll(['--limit-modules', 'java.base,jdk.unsupported'])
}